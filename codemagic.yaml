workflows:
  ios-release:
    name: KAKERU iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Kakeru
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kakeru.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Set build number
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST + 1))
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
